<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gir House — Check-in</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

    body {
      min-height: 100vh;
      background: #0a1f14;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 1.5rem;
      color: #d4af37;
      letter-spacing: 2px;
    }

    .header p {
      font-size: 0.85rem;
      color: #74c69d;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    #reader {
      width: 300px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #40916c;
    }

    #loading {
      display: none;
      margin-top: 20px;
      color: #74c69d;
      font-size: 0.95rem;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #result {
      display: none;
      width: 100%;
      max-width: 360px;
      border-radius: 14px;
      padding: 28px 24px;
      text-align: center;
      margin-top: 20px;
    }

    #result.green { background: #1b4332; border: 2px solid #40916c; }
    #result.red   { background: #4a0e0e; border: 2px solid #c0392b; }

    #result h2 { font-size: 1.5rem; margin-bottom: 10px; }

    #result .name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #d4af37;
      margin-bottom: 4px;
    }

    #result .email {
      font-size: 0.9rem;
      color: #b7e4c7;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      background: rgba(255,255,255,0.1);
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    #admitBtn  { background: #2d6a4f; color: #d4af37; border: 1px solid #40916c; }
    #admitBtn:hover { background: #40916c; }
    #scanAgain { background: rgba(255,255,255,0.08); color: #b7e4c7; }
    #scanAgain:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

  <div class="header">
    <h1>🦁 GIR HOUSE</h1>
    <p>PARADOX 2026 — CHECK-IN</p>
  </div>

  <div id="reader"></div>
  <p id="loading">⏳ Verifying pass...</p>

  <div id="result">
    <h2 id="resultTitle"></h2>
    <div class="name" id="resultName"></div>
    <div class="email" id="resultEmail"></div>
    <div class="badge" id="resultBadge"></div>
    <button id="admitBtn" onclick="admit()" style="display:none">✅ Admit</button>
    <button id="scanAgain" onclick="resetScanner()">🔄 Scan Another</button>
  </div>

  <script>
    const API = 'https://script.google.com/macros/s/AKfycbzpyeH5b6wBnq78juyQdI4YjLq_04JeDXW8qCdnNhsREFGLL2YFvprIusMD2N8MfscMKg/exec';

    let lastScannedId = null;
    let scanner = null;

    function startScanner() {
      document.getElementById('reader').style.display = 'block';
      document.getElementById('result').style.display = 'none';

      scanner = new Html5Qrcode('reader');
      scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 230, height: 230 } },
        onScanSuccess
      ).catch(err => {
        document.getElementById('reader').innerHTML =
          `<p style="color:#c0392b;padding:16px;font-size:0.9rem;">Camera error: ${err}</p>`;
      });
    }

    async function onScanSuccess(decodedText) {
      if (decodedText === lastScannedId) return;
      lastScannedId = decodedText;

      await scanner.stop();
      document.getElementById('reader').style.display = 'none';
      document.getElementById('loading').style.display = 'block';

      try {
        const res = await fetch(`${API}?action=check&id=${encodeURIComponent(decodedText)}`);
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';
        showResult(data);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        alert('Network error. Check connection.');
        resetScanner();
      }
    }

    function showResult(data) {
      const result = document.getElementById('result');
      result.style.display = 'block';

      if (data.found) {
        result.className = 'green';
        document.getElementById('resultTitle').innerText = '✅ Valid Pass';
        document.getElementById('resultName').innerText = '👤 ' + data.name;
        document.getElementById('resultEmail').innerText = '✉️ ' + data.email;

        if (data.alreadyAdmitted) {
          document.getElementById('resultBadge').innerText = '⚠️ Already Admitted';
          document.getElementById('admitBtn').style.display = 'none';
        } else {
          document.getElementById('resultBadge').innerText = 'Not yet admitted';
          document.getElementById('admitBtn').style.display = 'block';
        }
      } else {
        result.className = 'red';
        document.getElementById('resultTitle').innerText = '❌ Invalid Pass';
        document.getElementById('resultName').innerText = 'QR not found in system.';
        document.getElementById('resultEmail').innerText = '';
        document.getElementById('resultBadge').innerText = '';
        document.getElementById('admitBtn').style.display = 'none';
      }
    }

    async function admit() {
      document.getElementById('admitBtn').disabled = true;
      try {
        const res = await fetch(`${API}?action=admit&id=${encodeURIComponent(lastScannedId)}`);
        const data = await res.json();
        if (data.success) {
          document.getElementById('resultBadge').innerText = '✅ Admitted';
          document.getElementById('admitBtn').style.display = 'none';
        }
      } catch {
        alert('Failed to mark admission. Try again.');
        document.getElementById('admitBtn').disabled = false;
      }
    }

    function resetScanner() {
      lastScannedId = null;
      startScanner();
    }

    startScanner();
  </script>
</body>
</html>
